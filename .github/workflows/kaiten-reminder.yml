name: Kaiten Reminder

on:
  workflow_dispatch:
  schedule:
    - cron: "30 14 * * *"

jobs:
  run-kaiten-reminder:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install requests

      - name: Run Kaiten reminder
        env:
          KAITEN_TOKEN: ${{ secrets.KAITEN_TOKEN }}
        run: python worklog_reminder_bot.py --config worklog_reminder.config.json --only kaiten
